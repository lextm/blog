<!-- Pagefind search loader -->

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const pagefind = await import('{{ '/pagefind/pagefind.js' | relative_url }}');
    await pagefind.init();

    const searchInput = document.getElementById('search-input');
    const searchResults = document.getElementById('search-results');
    const noResultsMsg = '{{ site.data.locales[include.lang].search.no_results }}';

    searchInput.addEventListener('input', async () => {
      const query = searchInput.value.trim();
      if (!query) {
        searchResults.innerHTML = '';
        return;
      }

      try {
        const results = await pagefind.search(query);
        if (results.results.length === 0) {
          searchResults.innerHTML = `<p class="mt-5">${noResultsMsg}</p>`;
          return;
        }

        const items = await Promise.all(results.results.slice(0, 10).map(r => r.data()));
        searchResults.innerHTML = items.map(data => `
          <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
            <header>
              <h2><a href="${data.url}">${data.meta.title}</a></h2>
            </header>
            <p>${data.excerpt}</p>
          </article>
        `).join('');
      } catch (err) {
        console.error('Search failed:', err);
      }
    });
  });
</script>
